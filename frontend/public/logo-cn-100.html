<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>拿呀² Logo - 100 Variants</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 42px 24px 80px; }
h1 { text-align: center; margin-bottom: 8px; font-weight: 200; font-size: 24px; color: #777; letter-spacing: 1px; }
.sub { text-align: center; color: #444; font-size: 13px; margin-bottom: 34px; }
.grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px; max-width: 1500px; margin: 0 auto; }
.card { background: #191919; border: 1px solid #282828; border-radius: 16px; padding: 30px 18px 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 190px; }
.card:hover { border-color: #FF8A3D66; background: #1d1d1d; }
.card svg { width: 100%; max-width: 280px; height: 110px; }
.meta { margin-top: 12px; color: #666; font-size: 11px; line-height: 1.5; text-align: center; }
.idx { color: #999; font-weight: 600; }
.outline { fill: none; stroke: #FF8A3D; stroke-linejoin: round; stroke-linecap: round; font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; }
@media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
@media (max-width: 820px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>拿呀² - 100 Variants</h1>
<p class="sub">基于 1C：现代黑体 / 空心字 / 细描边 / 1 层叠影</p>
<div id="grid" class="grid"></div>

<script>
const grid = document.getElementById("grid");

const variants = [];
const base = {
  x: 46,
  y: 98,
  size: 70,
  weight: 800,
  stroke: 1.2,
  shadowStroke: 0.75,
  shadowOpacity: 0.32,
  shadowX: 10,
  shadowY: 10,
  supX: 148,
  supY: -42,
  supSize: 24,
  skew: -3,
  spacing: 0,
};

const groups = [
  // 1-10: around 1C, only tiny adjustments
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "微调",
    stroke: [1.05, 1.1, 1.15, 1.2, 1.25][i % 5],
    shadowX: [8, 9, 10, 11, 12][i % 5],
    shadowY: [8, 9, 10, 11, 12][(i + 1) % 5],
    supX: 145 + (i % 5),
    supY: -41 - Math.floor(i / 5),
  })),

  // 11-20: thinner strokes
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "更细",
    stroke: [0.8, 0.9, 1.0, 1.05, 1.1][i % 5],
    shadowStroke: [0.55, 0.6, 0.65, 0.7, 0.75][i % 5],
    shadowOpacity: [0.24, 0.28, 0.32, 0.36, 0.4][i % 5],
    shadowX: 9 + (i % 4),
    shadowY: 9 + ((i + 1) % 4),
    supSize: [22, 23, 24, 25, 26][i % 5],
  })),

  // 21-30: larger / smaller main text
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "字号",
    size: [64, 66, 68, 70, 72, 74, 76, 70, 68, 72][i],
    x: [56, 54, 50, 46, 42, 38, 34, 46, 50, 42][i],
    y: [96, 97, 98, 98, 99, 100, 101, 96, 100, 102][i],
    supX: [138, 141, 144, 148, 152, 156, 160, 146, 144, 152][i],
    supY: [-39, -40, -41, -42, -43, -44, -45, -40, -44, -46][i],
    supSize: [22, 23, 24, 24, 25, 26, 27, 23, 24, 25][i],
  })),

  // 31-40: superscript placement
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "角标位置",
    supX: [136, 140, 144, 148, 152, 138, 142, 146, 150, 154][i],
    supY: [-34, -36, -38, -40, -42, -44, -46, -48, -50, -52][i],
    supSize: [20, 21, 22, 23, 24, 25, 26, 24, 23, 22][i],
    stroke: [1.0, 1.05, 1.1, 1.15, 1.2][i % 5],
  })),

  // 41-50: skew angle
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "倾斜",
    skew: [-6, -5, -4, -3, -2, -1, 0, 1, -2.5, -3.5][i],
    x: [52, 50, 48, 46, 44, 42, 40, 38, 46, 48][i],
    shadowX: [8, 9, 10, 11, 12, 10, 9, 8, 13, 14][i],
    shadowY: [10, 10, 10, 10, 10, 9, 9, 9, 12, 12][i],
  })),

  // 51-60: shadow distance / opacity
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "叠影",
    shadowX: [4, 6, 8, 10, 12, 14, 16, 12, 8, 5][i],
    shadowY: [4, 6, 8, 10, 12, 14, 16, 8, 12, 14][i],
    shadowOpacity: [0.18, 0.22, 0.26, 0.3, 0.34, 0.38, 0.42, 0.28, 0.36, 0.44][i],
    shadowStroke: [0.55, 0.6, 0.65, 0.75, 0.85, 0.9, 0.95, 0.7, 0.8, 1.0][i],
  })),

  // 61-70: font weight / letter spacing
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "字重间距",
    weight: [600, 700, 800, 900, 800, 700, 900, 600, 800, 900][i],
    spacing: [-5, -3, -1, 0, 1, 2, 3, 4, -2, 5][i],
    stroke: [1.0, 1.1, 1.2, 1.3, 1.15, 1.05, 1.25, 0.95, 1.2, 1.35][i],
    supX: [136, 140, 144, 148, 150, 152, 154, 156, 142, 158][i],
  })),

  // 71-80: more compact compositions
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "紧凑",
    x: [62, 60, 58, 56, 54, 52, 50, 48, 58, 60][i],
    size: [62, 64, 66, 68, 70, 68, 66, 64, 70, 72][i],
    spacing: [-8, -7, -6, -5, -4, -3, -2, -1, -5, -6][i],
    supX: [124, 128, 132, 136, 140, 136, 132, 128, 138, 142][i],
    supY: [-36, -38, -40, -42, -44, -40, -38, -36, -46, -48][i],
  })),

  // 81-90: wider compositions
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "舒展",
    x: [30, 32, 34, 36, 38, 40, 42, 44, 34, 32][i],
    size: [68, 70, 72, 74, 76, 72, 70, 68, 74, 76][i],
    spacing: [2, 3, 4, 5, 6, 7, 8, 6, 4, 2][i],
    supX: [158, 164, 170, 176, 182, 174, 168, 162, 178, 184][i],
    supY: [-40, -42, -44, -46, -48, -42, -40, -38, -50, -52][i],
  })),

  // 91-100: balanced picks with mixed parameters
  ...Array.from({ length: 10 }, (_, i) => ({
    name: "混合",
    x: [48, 50, 52, 46, 44, 54, 56, 42, 40, 50][i],
    y: [96, 98, 100, 98, 96, 100, 102, 98, 96, 101][i],
    size: [68, 69, 70, 71, 72, 70, 68, 72, 74, 69][i],
    weight: [700, 800, 900, 800, 700, 900, 800, 700, 800, 900][i],
    stroke: [1.0, 1.1, 1.2, 1.15, 1.05, 1.25, 1.1, 0.95, 1.2, 1.3][i],
    shadowX: [8, 10, 12, 9, 11, 13, 7, 14, 10, 12][i],
    shadowY: [9, 10, 11, 12, 8, 13, 14, 10, 12, 9][i],
    shadowOpacity: [0.26, 0.3, 0.34, 0.28, 0.32, 0.36, 0.24, 0.38, 0.3, 0.34][i],
    supX: [142, 146, 150, 148, 144, 152, 140, 154, 146, 150][i],
    supY: [-38, -40, -42, -44, -46, -40, -36, -48, -42, -50][i],
    supSize: [22, 23, 24, 25, 24, 23, 22, 25, 24, 26][i],
    skew: [-4, -3, -2, -3.5, -2.5, -1.5, -5, -2, -3, -4][i],
    spacing: [-2, -1, 0, 1, 2, -3, 3, -4, 1, 0][i],
  })),
];

groups.slice(0, 100).forEach((item, index) => {
  variants.push({ ...base, ...item, id: index + 1 });
});

function svgFor(v) {
  const shadowStroke = v.shadowStroke ?? Math.max(0.55, v.stroke * 0.62);
  const supStroke = Math.max(0.75, v.stroke);
  const supShadowStroke = Math.max(0.5, shadowStroke * 0.95);
  const textAttrs = `font-weight="${v.weight}" letter-spacing="${v.spacing}"`;
  return `
    <svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
      <g class="outline" transform="translate(${v.x},${v.y}) skewY(${v.skew})" ${textAttrs}>
        <text x="0" y="0" font-size="${v.size}" stroke-width="${shadowStroke}" opacity="${v.shadowOpacity}" transform="translate(${v.shadowX},${v.shadowY})">拿呀</text>
        <text x="0" y="0" font-size="${v.size}" stroke-width="${v.stroke}">拿呀</text>
        <text x="${v.supX}" y="${v.supY}" font-size="${v.supSize}" stroke-width="${supShadowStroke}" opacity="${v.shadowOpacity}" transform="translate(${v.shadowX},${v.shadowY})">2</text>
        <text x="${v.supX}" y="${v.supY}" font-size="${v.supSize}" stroke-width="${supStroke}">2</text>
      </g>
    </svg>
  `;
}

variants.forEach((v) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    ${svgFor(v)}
    <div class="meta">
      <span class="idx">#${String(v.id).padStart(3, "0")}</span> ${v.name}<br>
      stroke ${v.stroke}px / shadow ${v.shadowX},${v.shadowY} / sup ${v.supX},${v.supY}
    </div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
