<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>拿呀² Logo - Glow Variants</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080808; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 48px 24px; }
h1 { text-align: center; margin-bottom: 10px; font-weight: 200; font-size: 24px; color: #666; }
.sub { text-align: center; color: #444; font-size: 13px; margin-bottom: 42px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 1280px; margin: 0 auto; }
.card { background: #121212; border: 1px solid #252525; border-radius: 20px; padding: 54px 28px 34px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.card:hover { border-color: #FF8A3D55; }
.card svg { width: 340px; height: 150px; }
.card p { margin-top: 18px; color: #555; font-size: 12px; letter-spacing: 1px; }
.outline { fill: none; stroke: #FF8A3D; stroke-linejoin: round; stroke-linecap: round; }
.modern { font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; font-weight: 800; }
</style>
</head>
<body>
<h1>拿呀² - Glow Variants</h1>
<p class="sub">基于 1C：主描边 1.2px，空心字，一层叠影</p>

<div class="grid">

<!-- Glow A: subtle -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowA" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.42 0 0 0.28  0 0 0.16 0 0.02  0 0 0 0.65 0" result="orangeBlur"/>
      <feMerge>
        <feMergeNode in="orangeBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g class="outline modern" transform="translate(46,98) skewY(-3)" filter="url(#glowA)">
    <text x="0" y="0" font-size="70" stroke-width="0.75" opacity="0.32" transform="translate(10,10)">拿呀</text>
    <text x="0" y="0" font-size="70" stroke-width="1.2">拿呀</text>
    <text x="148" y="-42" font-size="24" stroke-width="0.75" opacity="0.32" transform="translate(10,10)">2</text>
    <text x="148" y="-42" font-size="24" stroke-width="1.2">2</text>
  </g>
</svg>
<p>A - 轻微荧光</p>
</div>

<!-- Glow B: balanced -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowB" x="-45%" y="-65%" width="190%" height="230%">
      <feGaussianBlur stdDeviation="3.5" result="blur1"/>
      <feGaussianBlur stdDeviation="7" result="blur2"/>
      <feColorMatrix in="blur1" type="matrix" values="1 0 0 0 1  0 0.42 0 0 0.28  0 0 0.16 0 0.02  0 0 0 0.75 0" result="orangeBlur1"/>
      <feColorMatrix in="blur2" type="matrix" values="1 0 0 0 1  0 0.42 0 0 0.28  0 0 0.16 0 0.02  0 0 0 0.35 0" result="orangeBlur2"/>
      <feMerge>
        <feMergeNode in="orangeBlur2"/>
        <feMergeNode in="orangeBlur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g class="outline modern" transform="translate(46,98) skewY(-3)">
    <text x="0" y="0" font-size="70" stroke-width="0.75" opacity="0.32" transform="translate(10,10)">拿呀</text>
    <text x="148" y="-42" font-size="24" stroke-width="0.75" opacity="0.32" transform="translate(10,10)">2</text>
    <g filter="url(#glowB)">
      <text x="0" y="0" font-size="70" stroke-width="1.2">拿呀</text>
      <text x="148" y="-42" font-size="24" stroke-width="1.2">2</text>
    </g>
  </g>
</svg>
<p>B - 平衡荧光</p>
</div>

<!-- Glow C: strong -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowC" x="-55%" y="-75%" width="210%" height="250%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="9" result="blur2"/>
      <feGaussianBlur stdDeviation="15" result="blur3"/>
      <feColorMatrix in="blur1" type="matrix" values="1 0 0 0 1  0 0.42 0 0 0.28  0 0 0.16 0 0.02  0 0 0 0.9 0" result="orangeBlur1"/>
      <feColorMatrix in="blur2" type="matrix" values="1 0 0 0 1  0 0.42 0 0 0.28  0 0 0.16 0 0.02  0 0 0 0.45 0" result="orangeBlur2"/>
      <feColorMatrix in="blur3" type="matrix" values="1 0 0 0 1  0 0.42 0 0 0.28  0 0 0.16 0 0.02  0 0 0 0.25 0" result="orangeBlur3"/>
      <feMerge>
        <feMergeNode in="orangeBlur3"/>
        <feMergeNode in="orangeBlur2"/>
        <feMergeNode in="orangeBlur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g class="outline modern" transform="translate(46,98) skewY(-3)" filter="url(#glowC)">
    <text x="0" y="0" font-size="70" stroke-width="0.75" opacity="0.32" transform="translate(10,10)">拿呀</text>
    <text x="0" y="0" font-size="70" stroke-width="1.2">拿呀</text>
    <text x="148" y="-42" font-size="24" stroke-width="0.75" opacity="0.32" transform="translate(10,10)">2</text>
    <text x="148" y="-42" font-size="24" stroke-width="1.2">2</text>
  </g>
</svg>
<p>C - 强荧光</p>
</div>

</div>
</body>
</html>
