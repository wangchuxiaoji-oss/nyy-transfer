<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NYY Logo - #16 Bold Variants</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: -apple-system, system-ui, sans-serif; padding: 48px 24px; }
h1 { text-align: center; margin-bottom: 48px; font-weight: 200; font-size: 24px; color: #555; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; max-width: 1200px; margin: 0 auto; }
.card { background: #141414; border: 1px solid #222; border-radius: 20px; padding: 52px 32px 36px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.card:hover { border-color: #FF8A3D55; }
.card svg { width: 260px; height: 130px; }
.card p { margin-top: 20px; color: #555; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
</style>
</head>
<body>
<h1>NYY — BOLD 3D VARIANTS</h1>
<div class="grid">

<!-- #1: Heavy perspective, 8 layers, dramatic skew -->
<div class="card">
<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="ny1" d="M0,65 L0,0 L10,0 L40,48 L40,0 L50,0 L50,65 L40,65 L10,17 L10,65 Z M65,0 L76,0 L92,30 L108,0 L119,0 L98,38 L98,65 L86,65 L86,38 Z M132,0 L143,0 L159,30 L175,0 L186,0 L165,38 L165,65 L153,65 L153,38 Z"/>
  </defs>
  <g transform="translate(55,25)">
    <use href="#ny1" fill="none" stroke="#FF8A3D" stroke-width="0.4" opacity="0.05" transform="skewY(-8) skewX(3) translate(28,22) scale(0.88)"/>
    <use href="#ny1" fill="none" stroke="#FF8A3D" stroke-width="0.5" opacity="0.08" transform="skewY(-7) skewX(2.5) translate(24,19) scale(0.9)"/>
    <use href="#ny1" fill="none" stroke="#FF8A3D" stroke-width="0.6" opacity="0.12" transform="skewY(-6) skewX(2) translate(20,16) scale(0.92)"/>
    <use href="#ny1" fill="none" stroke="#FF8A3D" stroke-width="0.8" opacity="0.18" transform="skewY(-5) skewX(1.5) translate(16,13) scale(0.94)"/>
    <use href="#ny1" fill="none" stroke="#FF8A3D" stroke-width="1" opacity="0.25" transform="skewY(-4) skewX(1) translate(12,10) scale(0.95)"/>
    <use href="#ny1" fill="none" stroke="#FF8A3D" stroke-width="1.2" opacity="0.35" transform="skewY(-3) skewX(0.7) translate(8,7) scale(0.97)"/>
    <use href="#ny1" fill="none" stroke="#FF8A3D" stroke-width="1.5" opacity="0.55" transform="skewY(-1.5) translate(4,3) scale(0.99)"/>
    <use href="#ny1" fill="none" stroke="#FF8A3D" stroke-width="2.5" opacity="1"/>
  </g>
</svg>
<p>#1 Deep Tunnel</p>
</div>

<!-- #2: Outline layers + solid front, color shift in echoes -->
<div class="card">
<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="ny2" d="M0,65 L0,0 L10,0 L40,48 L40,0 L50,0 L50,65 L40,65 L10,17 L10,65 Z M65,0 L76,0 L92,30 L108,0 L119,0 L98,38 L98,65 L86,65 L86,38 Z M132,0 L143,0 L159,30 L175,0 L186,0 L165,38 L165,65 L153,65 L153,38 Z"/>
  </defs>
  <g transform="translate(55,25)">
    <use href="#ny2" fill="none" stroke="#ff4500" stroke-width="0.6" opacity="0.15" transform="skewY(-6) translate(20,18) scale(0.92)"/>
    <use href="#ny2" fill="none" stroke="#ff6a00" stroke-width="0.8" opacity="0.2" transform="skewY(-4.5) translate(15,13) scale(0.94)"/>
    <use href="#ny2" fill="none" stroke="#FF8A3D" stroke-width="1" opacity="0.3" transform="skewY(-3) translate(10,9) scale(0.96)"/>
    <use href="#ny2" fill="none" stroke="#FFa060" stroke-width="1.3" opacity="0.5" transform="skewY(-1.5) translate(5,4) scale(0.98)"/>
    <use href="#ny2" fill="#FF8A3D" stroke="none" opacity="1"/>
  </g>
</svg>
<p>#2 Color Shift + Solid Front</p>
</div>

<!-- #3: Explosion outward - echoes go bigger -->
<div class="card">
<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="ny3" d="M0,65 L0,0 L10,0 L40,48 L40,0 L50,0 L50,65 L40,65 L10,17 L10,65 Z M65,0 L76,0 L92,30 L108,0 L119,0 L98,38 L98,65 L86,65 L86,38 Z M132,0 L143,0 L159,30 L175,0 L186,0 L165,38 L165,65 L153,65 L153,38 Z"/>
  </defs>
  <g transform="translate(60,30)">
    <use href="#ny3" fill="none" stroke="#FF8A3D" stroke-width="0.5" opacity="0.06" transform="translate(93,32) scale(1.25) translate(-93,-32) skewY(2)"/>
    <use href="#ny3" fill="none" stroke="#FF8A3D" stroke-width="0.7" opacity="0.12" transform="translate(93,32) scale(1.16) translate(-93,-32) skewY(1.2)"/>
    <use href="#ny3" fill="none" stroke="#FF8A3D" stroke-width="1" opacity="0.2" transform="translate(93,32) scale(1.09) translate(-93,-32) skewY(0.6)"/>
    <use href="#ny3" fill="none" stroke="#FF8A3D" stroke-width="1.3" opacity="0.35" transform="translate(93,32) scale(1.04) translate(-93,-32)"/>
    <use href="#ny3" fill="none" stroke="#FF8A3D" stroke-width="2.5" opacity="1"/>
  </g>
</svg>
<p>#3 Shockwave Outward</p>
</div>

<!-- #4: Dual direction - echoes go both up-left and down-right -->
<div class="card">
<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="ny4" d="M0,65 L0,0 L10,0 L40,48 L40,0 L50,0 L50,65 L40,65 L10,17 L10,65 Z M65,0 L76,0 L92,30 L108,0 L119,0 L98,38 L98,65 L86,65 L86,38 Z M132,0 L143,0 L159,30 L175,0 L186,0 L165,38 L165,65 L153,65 L153,38 Z"/>
  </defs>
  <g transform="translate(55,28)">
    <!-- Back echoes (upper-left) -->
    <use href="#ny4" fill="none" stroke="#FF8A3D" stroke-width="0.5" opacity="0.08" transform="translate(-8,-8) skewY(3) scale(0.94)"/>
    <use href="#ny4" fill="none" stroke="#FF8A3D" stroke-width="0.7" opacity="0.15" transform="translate(-4,-4) skewY(1.5) scale(0.97)"/>
    <!-- Front echoes (lower-right) -->
    <use href="#ny4" fill="none" stroke="#FF8A3D" stroke-width="0.7" opacity="0.15" transform="translate(4,4) skewY(-1.5) scale(1.03)"/>
    <use href="#ny4" fill="none" stroke="#FF8A3D" stroke-width="0.5" opacity="0.08" transform="translate(8,8) skewY(-3) scale(1.06)"/>
    <!-- Main -->
    <use href="#ny4" fill="none" stroke="#FF8A3D" stroke-width="2.5" opacity="1"/>
  </g>
</svg>
<p>#4 Dual Echo (Both Directions)</p>
</div>

<!-- #5: Dramatic tilt with filled shadow mass -->
<div class="card">
<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="ny5" d="M0,65 L0,0 L10,0 L40,48 L40,0 L50,0 L50,65 L40,65 L10,17 L10,65 Z M65,0 L76,0 L92,30 L108,0 L119,0 L98,38 L98,65 L86,65 L86,38 Z M132,0 L143,0 L159,30 L175,0 L186,0 L165,38 L165,65 L153,65 L153,38 Z"/>
    <filter id="blur5"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <g transform="translate(50,22)">
    <!-- Blurred filled shadow mass -->
    <use href="#ny5" fill="#FF8A3D" opacity="0.12" filter="url(#blur5)" transform="skewY(-7) skewX(4) translate(18,16) scale(0.9)"/>
    <!-- Outline echoes -->
    <use href="#ny5" fill="none" stroke="#FF8A3D" stroke-width="0.8" opacity="0.15" transform="skewY(-5) skewX(2.5) translate(14,12) scale(0.93)"/>
    <use href="#ny5" fill="none" stroke="#FF8A3D" stroke-width="1" opacity="0.3" transform="skewY(-3) skewX(1.5) translate(8,7) scale(0.96)"/>
    <use href="#ny5" fill="none" stroke="#FF8A3D" stroke-width="1.5" opacity="0.55" transform="skewY(-1.5) skewX(0.5) translate(3,3) scale(0.98)"/>
    <!-- Front: solid fill -->
    <use href="#ny5" fill="#FF8A3D" opacity="1"/>
  </g>
</svg>
<p>#5 Shadow Mass + Solid</p>
</div>

<!-- #6: Spiral/twist - each layer rotates more -->
<div class="card">
<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="ny6" d="M0,65 L0,0 L10,0 L40,48 L40,0 L50,0 L50,65 L40,65 L10,17 L10,65 Z M65,0 L76,0 L92,30 L108,0 L119,0 L98,38 L98,65 L86,65 L86,38 Z M132,0 L143,0 L159,30 L175,0 L186,0 L165,38 L165,65 L153,65 L153,38 Z"/>
  </defs>
  <g transform="translate(60,30)">
    <use href="#ny6" fill="none" stroke="#FF8A3D" stroke-width="0.5" opacity="0.06" transform="rotate(-8,93,32) scale(0.88) translate(8,6)"/>
    <use href="#ny6" fill="none" stroke="#FF8A3D" stroke-width="0.7" opacity="0.1" transform="rotate(-6,93,32) scale(0.91) translate(6,4)"/>
    <use href="#ny6" fill="none" stroke="#FF8A3D" stroke-width="0.9" opacity="0.17" transform="rotate(-4,93,32) scale(0.94) translate(4,3)"/>
    <use href="#ny6" fill="none" stroke="#FF8A3D" stroke-width="1.1" opacity="0.28" transform="rotate(-2.5,93,32) scale(0.96) translate(2,1.5)"/>
    <use href="#ny6" fill="none" stroke="#FF8A3D" stroke-width="1.4" opacity="0.45" transform="rotate(-1,93,32) scale(0.98) translate(1,0.5)"/>
    <use href="#ny6" fill="none" stroke="#FF8A3D" stroke-width="2.5" opacity="1"/>
  </g>
</svg>
<p>#6 Spiral Twist</p>
</div>

<!-- #7: Glitch layers with horizontal displacement -->
<div class="card">
<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="ny7" d="M0,65 L0,0 L10,0 L40,48 L40,0 L50,0 L50,65 L40,65 L10,17 L10,65 Z M65,0 L76,0 L92,30 L108,0 L119,0 L98,38 L98,65 L86,65 L86,38 Z M132,0 L143,0 L159,30 L175,0 L186,0 L165,38 L165,65 L153,65 L153,38 Z"/>
    <clipPath id="slice7a"><rect x="0" y="0" width="320" height="30"/></clipPath>
    <clipPath id="slice7b"><rect x="0" y="30" width="320" height="25"/></clipPath>
    <clipPath id="slice7c"><rect x="0" y="55" width="320" height="30"/></clipPath>
    <clipPath id="slice7d"><rect x="0" y="85" width="320" height="45"/></clipPath>
  </defs>
  <g transform="translate(55,25)">
    <!-- Echo layers with skew -->
    <use href="#ny7" fill="none" stroke="#FF8A3D" stroke-width="0.8" opacity="0.15" transform="skewY(-5) translate(14,12) scale(0.93)"/>
    <use href="#ny7" fill="none" stroke="#FF8A3D" stroke-width="1.2" opacity="0.3" transform="skewY(-2.5) translate(7,6) scale(0.96)"/>
    <!-- Main with horizontal glitch slices -->
    <g clip-path="url(#slice7a)"><use href="#ny7" fill="none" stroke="#FF8A3D" stroke-width="2.5" transform="translate(3,0)"/></g>
    <g clip-path="url(#slice7b)"><use href="#ny7" fill="none" stroke="#FF8A3D" stroke-width="2.5" transform="translate(-2,0)"/></g>
    <g clip-path="url(#slice7c)"><use href="#ny7" fill="none" stroke="#FF8A3D" stroke-width="2.5" transform="translate(4,0)"/></g>
    <g clip-path="url(#slice7d)"><use href="#ny7" fill="none" stroke="#FF8A3D" stroke-width="2.5" transform="translate(-1,0)"/></g>
  </g>
</svg>
<p>#7 Glitch Slice + Depth</p>
</div>

<!-- #8: Thick front + thin echoes fanning with glow -->
<div class="card">
<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="ny8" d="M0,65 L0,0 L10,0 L40,48 L40,0 L50,0 L50,65 L40,65 L10,17 L10,65 Z M65,0 L76,0 L92,30 L108,0 L119,0 L98,38 L98,65 L86,65 L86,38 Z M132,0 L143,0 L159,30 L175,0 L186,0 L165,38 L165,65 L153,65 L153,38 Z"/>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(55,28)">
    <use href="#ny8" fill="none" stroke="#FF8A3D" stroke-width="0.4" opacity="0.07" transform="skewY(-9) translate(22,20) scale(0.86)"/>
    <use href="#ny8" fill="none" stroke="#FF8A3D" stroke-width="0.6" opacity="0.12" transform="skewY(-7) translate(17,15) scale(0.89)"/>
    <use href="#ny8" fill="none" stroke="#FF8A3D" stroke-width="0.8" opacity="0.18" transform="skewY(-5) translate(12,10) scale(0.92)"/>
    <use href="#ny8" fill="none" stroke="#FF8A3D" stroke-width="1" opacity="0.28" transform="skewY(-3.5) translate(8,7) scale(0.95)"/>
    <use href="#ny8" fill="none" stroke="#FF8A3D" stroke-width="1.3" opacity="0.42" transform="skewY(-2) translate(4,3) scale(0.98)"/>
    <!-- Front with glow -->
    <use href="#ny8" fill="none" stroke="#FF8A3D" stroke-width="3" opacity="1" filter="url(#glow8)"/>
  </g>
</svg>
<p>#8 Tunnel + Neon Front</p>
</div>

</div>
</body>
</html>
