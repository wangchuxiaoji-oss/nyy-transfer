<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>拿呀² Logo Candidates</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 48px 24px; }
h1 { text-align: center; margin-bottom: 10px; font-weight: 200; font-size: 24px; color: #666; }
.sub { text-align: center; color: #444; font-size: 13px; margin-bottom: 42px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; max-width: 1100px; margin: 0 auto; }
.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 54px 32px 34px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.card:hover { border-color: #FF8A3D44; }
.card svg { width: 360px; height: 150px; }
.card p { margin-top: 18px; color: #555; font-size: 12px; letter-spacing: 1px; }
.outline { fill: none; stroke: #FF8A3D; stroke-linejoin: round; stroke-linecap: round; }
.shadow-a { opacity: 0.32; stroke-width: 1.15; transform: translate(10px, 10px); }
.main { opacity: 1; stroke-width: 2; }
.modern { font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; font-weight: 800; }
.round { font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif; font-weight: 700; }
.kai { font-family: KaiTi, STKaiti, "Kaiti SC", serif; font-weight: 700; }
.xingkai { font-family: STXingkai, "Xingkai SC", FZShuTi, KaiTi, serif; font-weight: 700; }
</style>
</head>
<body>
<h1>拿呀² - Chinese Logo Drafts</h1>
<p class="sub">全部空心描边，2 层叠影，平方角标贴近「呀」</p>

<div class="grid">

<!-- 1 Modern Hei -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <g class="outline modern" transform="translate(46,98) skewY(-3)">
    <text class="shadow-a" x="0" y="0" font-size="70">拿呀</text>
    <text class="main" x="0" y="0" font-size="70">拿呀</text>
    <text class="shadow-a" x="148" y="-42" font-size="24">2</text>
    <text class="main" x="148" y="-42" font-size="24">2</text>
  </g>
</svg>
<p>1 - 现代黑体</p>
</div>

<!-- 2 Rounded -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <g class="outline round" transform="translate(44,98) skewY(-3)">
    <text class="shadow-a" x="0" y="0" font-size="70">拿呀</text>
    <text class="main" x="0" y="0" font-size="70">拿呀</text>
    <text class="shadow-a" x="148" y="-42" font-size="24">2</text>
    <text class="main" x="148" y="-42" font-size="24">2</text>
  </g>
</svg>
<p>2 - 偏圆润</p>
</div>

<!-- 3 Kai -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <g class="outline kai" transform="translate(42,98) skewY(-3)">
    <text class="shadow-a" x="0" y="0" font-size="76">拿呀</text>
    <text class="main" x="0" y="0" font-size="76">拿呀</text>
    <text class="shadow-a" x="146" y="-44" font-size="25">2</text>
    <text class="main" x="146" y="-44" font-size="25">2</text>
  </g>
</svg>
<p>3 - 楷体 / 手写感</p>
</div>

<!-- 4 Xingkai / Brush -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <g class="outline xingkai" transform="translate(40,98) skewY(-3)">
    <text class="shadow-a" x="0" y="0" font-size="78">拿呀</text>
    <text class="main" x="0" y="0" font-size="78">拿呀</text>
    <text class="shadow-a" x="150" y="-45" font-size="25">2</text>
    <text class="main" x="150" y="-45" font-size="25">2</text>
  </g>
</svg>
<p>4 - 行楷 / 毛笔感</p>
</div>

<!-- 5 Modern compact -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <g class="outline modern" transform="translate(58,96) skewY(-3)">
    <text class="shadow-a" x="0" y="0" font-size="66">拿呀</text>
    <text class="main" x="0" y="0" font-size="66">拿呀</text>
    <text class="shadow-a" x="138" y="-40" font-size="23">2</text>
    <text class="main" x="138" y="-40" font-size="23">2</text>
  </g>
</svg>
<p>5 - 黑体紧凑版</p>
</div>

<!-- 6 Brush compact -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <g class="outline xingkai" transform="translate(52,98) skewY(-3)">
    <text class="shadow-a" x="0" y="0" font-size="74">拿呀</text>
    <text class="main" x="0" y="0" font-size="74">拿呀</text>
    <text class="shadow-a" x="143" y="-43" font-size="24">2</text>
    <text class="main" x="143" y="-43" font-size="24">2</text>
  </g>
</svg>
<p>6 - 行楷紧凑版</p>
</div>

</div>
</body>
</html>
