<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>拿呀² Logo - Thin Stroke Variants</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 48px 24px; }
h1 { text-align: center; margin-bottom: 10px; font-weight: 200; font-size: 24px; color: #666; }
.sub { text-align: center; color: #444; font-size: 13px; margin-bottom: 42px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 1280px; margin: 0 auto; }
.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 54px 28px 34px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.card:hover { border-color: #FF8A3D44; }
.card svg { width: 340px; height: 150px; }
.card p { margin-top: 18px; color: #555; font-size: 12px; letter-spacing: 1px; }
.outline { fill: none; stroke: #FF8A3D; stroke-linejoin: round; stroke-linecap: round; }
.modern { font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; font-weight: 800; }
</style>
</head>
<body>
<h1>拿呀² - Thin Stroke Variants</h1>
<p class="sub">基于 logo-cn 结果 1：现代黑体、空心字、1 层叠影、角标位置不变</p>

<div class="grid">

<!-- 1A: main stroke 1.6 -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <g class="outline modern" transform="translate(46,98) skewY(-3)">
    <text x="0" y="0" font-size="70" stroke-width="0.95" opacity="0.32" transform="translate(10,10)">拿呀</text>
    <text x="0" y="0" font-size="70" stroke-width="1.6">拿呀</text>
    <text x="148" y="-42" font-size="24" stroke-width="0.95" opacity="0.32" transform="translate(10,10)">2</text>
    <text x="148" y="-42" font-size="24" stroke-width="1.6">2</text>
  </g>
</svg>
<p>1A - 主描边 1.6px</p>
</div>

<!-- 1B: main stroke 1.4 -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <g class="outline modern" transform="translate(46,98) skewY(-3)">
    <text x="0" y="0" font-size="70" stroke-width="0.85" opacity="0.32" transform="translate(10,10)">拿呀</text>
    <text x="0" y="0" font-size="70" stroke-width="1.4">拿呀</text>
    <text x="148" y="-42" font-size="24" stroke-width="0.85" opacity="0.32" transform="translate(10,10)">2</text>
    <text x="148" y="-42" font-size="24" stroke-width="1.4">2</text>
  </g>
</svg>
<p>1B - 主描边 1.4px</p>
</div>

<!-- 1C: main stroke 1.2 -->
<div class="card">
<svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg">
  <g class="outline modern" transform="translate(46,98) skewY(-3)">
    <text x="0" y="0" font-size="70" stroke-width="0.75" opacity="0.32" transform="translate(10,10)">拿呀</text>
    <text x="0" y="0" font-size="70" stroke-width="1.2">拿呀</text>
    <text x="148" y="-42" font-size="24" stroke-width="0.75" opacity="0.32" transform="translate(10,10)">2</text>
    <text x="148" y="-42" font-size="24" stroke-width="1.2">2</text>
  </g>
</svg>
<p>1C - 主描边 1.2px</p>
</div>

</div>
</body>
</html>
