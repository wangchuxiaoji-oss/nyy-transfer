<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NYY Logo - NY Squared</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 48px 24px; }
h1 { text-align: center; margin-bottom: 10px; font-weight: 200; font-size: 24px; color: #666; }
.sub { text-align: center; color: #444; font-size: 13px; margin-bottom: 42px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; max-width: 1100px; margin: 0 auto; }
.card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 54px 32px 34px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.card:hover { border-color: #FF8A3D44; }
.card svg { width: 300px; height: 140px; }
.card p { margin-top: 18px; color: #555; font-size: 12px; letter-spacing: 1px; }
</style>
</head>
<body>
<h1>NY² - Based on V3 #1</h1>
<p class="sub">保留 V3#1 的 outline stack 和轻微 skew，只把 YY 改为 Y 的二次方</p>

<div class="grid">

<!-- A: direct NY squared -->
<div class="card">
<svg viewBox="0 0 300 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="nyA" d="M20,80 L20,15 L30,15 L58,60 L58,15 L68,15 L68,80 L58,80 L30,35 L30,80 Z M85,15 L96,15 L111,44 L126,15 L137,15 L117,52 L117,80 L105,80 L105,52 Z"/>

  </defs>
  <g transform="translate(50,18) skewY(-3)" fill="none" stroke="#FF8A3D" stroke-linecap="round" stroke-linejoin="round">
    <g opacity="0.12" stroke-width="1" transform="translate(12,12)"><use href="#nyA"/><use href="#twoA"/></g>
    <g opacity="0.25" stroke-width="1" transform="translate(8,8)"><use href="#nyA"/><use href="#twoA"/></g>
    <g opacity="0.45" stroke-width="1.2" transform="translate(4,4)"><use href="#nyA"/><use href="#twoA"/></g>
    <g opacity="1" stroke-width="2"><use href="#nyA"/><use href="#twoA"/></g>
  </g>
</svg>
<p>A - Smaller Superscript</p>
</div>
