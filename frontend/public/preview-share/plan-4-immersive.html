<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>方案 4 · 沉浸式暗场 + 浮动 HUD — nyy</title>
<style>
  :root {
    --orange: #FF8A3D;
    --orange-dark: #E8762E;
    --orange-soft: #FFF4EB;
    --bg: #000;
    --text: #f5f5f7;
    --text-muted: rgba(255,255,255,0.65);
    --text-dim: rgba(255,255,255,0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { background: #1a1a1a; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .browser { width: 1880px; height: 1080px; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08); display: flex; flex-direction: column; }
  .chrome { height: 44px; background: linear-gradient(to bottom, #1f1f1f, #0d0d0d); display: flex; align-items: center; padding: 0 16px; gap: 14px; border-bottom: 1px solid #000; flex-shrink: 0; }
  .lights { display: flex; gap: 8px; }
  .lights span { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .lights .r { background: #ff5f57; box-shadow: inset 0 0 0 0.5px #e0443e; }
  .lights .y { background: #febc2e; box-shadow: inset 0 0 0 0.5px #dea123; }
  .lights .g { background: #28c840; box-shadow: inset 0 0 0 0.5px #1aab29; }
  .toolbar { display: flex; gap: 4px; }
  .toolbar .btn { width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: #999; font-size: 14px; }
  .addr { flex: 1; max-width: 720px; height: 28px; background: #1a1a1a; border-radius: 6px; display: flex; align-items: center; padding: 0 12px; gap: 8px; font-size: 12px; color: #d0d0d0; box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.1); }
  .viewport { flex: 1; overflow: hidden; position: relative; background: #000; }

  /* === 方案 4:沉浸式暗场 === */
  .immersive {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, #1a1410 0%, #000 70%),
      #000;
    display: flex; align-items: center; justify-content: center;
  }

  /* 电影画布(黑色背景上的视频框) */
  .film-stage {
    position: relative;
    width: min(1280px, 90%);
    aspect-ratio: 16/9;
    max-height: 80%;
    background: #050505;
    border-radius: 6px;
    overflow: hidden;
    box-shadow:
      0 0 100px rgba(255,138,61,0.05),
      0 30px 80px rgba(0,0,0,0.8),
      inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .film-canvas {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 30%, #4a2818 0%, transparent 50%),
      radial-gradient(ellipse at 75% 70%, #1a2a45 0%, transparent 55%),
      linear-gradient(135deg, #0f0f1a 0%, #000 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .movie-poster {
    position: relative; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .movie-poster .tag-top {
    position: absolute; top: 8%; left: 7%;
    font-size: 12px; letter-spacing: 0.4em; color: rgba(255,138,61,0.95);
    font-weight: 600;
  }
  .movie-poster .title {
    font-size: 96px; font-weight: 900;
    color: #fff;
    text-shadow:
      0 4px 30px rgba(0,0,0,0.9),
      0 0 80px rgba(255,138,61,0.4);
    letter-spacing: 0.04em; line-height: 0.95;
  }
  .movie-poster .sub {
    font-size: 16px; color: rgba(255,255,255,0.55);
    margin-top: 20px; letter-spacing: 0.3em; font-weight: 400;
  }
  .movie-poster .scene {
    position: absolute; bottom: 14%; right: 7%;
    width: 320px; height: 180px;
    background: linear-gradient(135deg, #ff6b35 0%, #c1351f 100%);
    border-radius: 6px;
    box-shadow: 0 25px 60px rgba(255,107,53,0.5);
  }
  .movie-poster .scene::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(255,200,100,0.6), transparent 60%);
  }
  .play-btn-big {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100px; height: 100px;
    background: rgba(255,138,61,0.95);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 12px 40px rgba(255,138,61,0.5),
      0 0 0 12px rgba(255,138,61,0.15),
      0 0 0 24px rgba(255,138,61,0.07);
  }
  .play-btn-big::before {
    content: '';
    width: 0; height: 0;
    border-left: 28px solid white;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    margin-left: 7px;
  }
  .play-pulse {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,138,61,0.3);
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
    100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
  }

  /* 顶 HUD */
  .hud-top {
    position: absolute; top: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
    display: flex; align-items: center;
    padding: 0 32px;
    z-index: 10;
  }
  .hud-back {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px;
    margin-right: 16px;
  }
  .hud-title {
    flex: 1;
    color: white;
  }
  .hud-title .name {
    font-size: 15px; font-weight: 600; letter-spacing: 0.02em;
  }
  .hud-title .sub {
    font-size: 11px; color: rgba(255,255,255,0.6);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }
  .hud-actions {
    display: flex; gap: 8px; align-items: center;
  }
  .hud-btn {
    height: 36px; padding: 0 14px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    color: white; font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .hud-btn.primary {
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border: none;
    box-shadow: 0 2px 8px rgba(255,138,61,0.4);
  }
  .hud-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px;
  }

  /* 底 HUD */
  .hud-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 10;
  }
  .progress-zone {
    height: 60px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    display: flex; align-items: flex-end;
    padding: 0 32px 8px;
    gap: 12px;
  }
  .progress-bar-wrap {
    flex: 1; height: 4px; background: rgba(255,255,255,0.2);
    border-radius: 2px; position: relative; cursor: pointer;
  }
  .progress-bar-bg { height: 100%; background: rgba(255,255,255,0.2); border-radius: 2px; }
  .progress-bar-fill { position: absolute; top: 0; left: 0; height: 100%; width: 18%; background: var(--orange); border-radius: 2px; }
  .progress-bar-thumb {
    position: absolute; top: 50%; left: 18%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    background: var(--orange);
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(255,138,61,0.3);
  }
  .progress-time { color: white; font-size: 12px; font-family: ui-monospace, monospace; min-width: 110px; }

  .ctrl-zone {
    height: 72px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.5));
    display: flex; align-items: center;
    padding: 0 32px;
    gap: 14px;
  }
  .ctrl-play {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--orange);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px;
    box-shadow: 0 2px 8px rgba(255,138,61,0.4);
  }
  .ctrl-skip { color: rgba(255,255,255,0.85); font-size: 18px; cursor: pointer; }
  .ctrl-spacer { flex: 1; }
  .ctrl-vol {
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.85);
  }
  .vol-bar {
    width: 80px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px; position: relative;
  }
  .vol-bar-fill { width: 70%; height: 100%; background: white; border-radius: 2px; }
  .vol-bar-thumb { position: absolute; right: -5px; top: -5px; width: 14px; height: 14px; background: white; border-radius: 50%; }
  .ctrl-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.85); font-size: 14px; }

  /* 左下角信息(分享者+倒计时) */
  .info-card {
    position: absolute;
    bottom: 90px; left: 32px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 14px;
    color: white;
    z-index: 10;
    max-width: 280px;
  }
  .info-card .row { display: flex; align-items: center; gap: 8px; }
  .info-card .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 11px; font-weight: 600;
  }
  .info-card .name { font-size: 13px; font-weight: 500; }
  .info-card .name b { color: var(--orange); font-weight: 600; }
  .info-card .sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  /* 右下角"打开"按钮 */
  .floating-btn {
    position: absolute;
    bottom: 90px; right: 32px;
    z-index: 10;
  }
  .floating-btn button {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 8px 14px;
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    display: flex; align-items: center; gap: 6px;
  }

  /* 中央侧边 hover 提示(模拟"鼠标最近动过") */
  .hud-cursor {
    position: absolute;
    top: 50%; right: 80px;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    pointer-events: none;
    z-index: 11;
  }
  .hud-cursor::before {
    content: ''; position: absolute; left: 0; top: 0;
    width: 0; height: 0;
    border-left: 12px solid white;
    border-bottom: 8px solid transparent;
    border-top: 8px solid transparent;
    transform: rotate(-15deg);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .hud-cursor::after {
    content: '00:32:14';
    position: absolute; left: 18px; top: 8px;
    color: rgba(255,255,255,0.85);
    font-size: 12px; font-family: ui-monospace, monospace;
    white-space: nowrap;
    background: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* 角标:右上"SDP 自研"小徽章 */
  .quality-badge {
    position: absolute;
    top: 100px; right: 32px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    color: white;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px; font-weight: 500;
    z-index: 10;
    display: flex; align-items: center; gap: 5px;
  }
  .quality-badge::before {
    content: ''; width: 5px; height: 5px; background: var(--orange); border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="browser">
    <div class="chrome">
      <div class="lights"><span class="r"></span><span class="y"></span><span class="g"></span></div>
      <div class="toolbar"><span class="btn">‹</span><span class="btn disabled">›</span></div>
      <div class="addr"><span class="lock">🔒</span>dev.nyy.app/s/Ab3F7K/play</div>
    </div>
    <div class="viewport">
      <div class="immersive">
        <!-- 顶 HUD -->
        <div class="hud-top">
          <div class="hud-back">‹</div>
          <div class="hud-title">
            <div class="name">碟中谍8-最后的清算.mkv</div>
            <div class="sub">5.28 GB · 分享者 <b style="color:var(--orange);">小爱同学</b> · 7 天后过期</div>
          </div>
          <div class="hud-actions">
            <button class="hud-btn primary">⬇ 下载文件</button>
            <button class="hud-btn">⤴ 转存</button>
            <button class="hud-icon">⋯</button>
            <button class="hud-icon">i</button>
          </div>
        </div>

        <!-- 视频画布 -->
        <div class="film-stage">
          <div class="film-canvas">
            <div class="movie-poster">
              <div class="tag-top">PARAMOUNT · 2025</div>
              <div class="title">碟中谍 8</div>
              <div class="sub">MISSION: IMPOSSIBLE — THE FINAL RECKONING</div>
              <div class="scene"></div>
            </div>
            <div class="play-pulse"></div>
            <div class="play-btn-big"></div>
          </div>
        </div>

        <!-- 质量徽章 -->
        <div class="quality-badge">1080p · H.265</div>

        <!-- 左下分享者信息 -->
        <div class="info-card">
          <div class="row">
            <div class="avatar">小</div>
            <div class="name"><b>小爱同学</b> 分享</div>
          </div>
          <div class="sub">2 天前 · 已被下载 7 次</div>
        </div>

        <!-- 鼠标位置 -->
        <div class="hud-cursor"></div>

        <!-- 底 HUD -->
        <div class="hud-bottom">
          <div class="progress-zone">
            <div class="progress-time">00:32:14</div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-bg"></div>
              <div class="progress-bar-fill"></div>
              <div class="progress-bar-thumb"></div>
            </div>
            <div class="progress-time">02:49:36</div>
          </div>
          <div class="ctrl-zone">
            <div class="ctrl-skip">⏮</div>
            <div class="ctrl-play">⏸</div>
            <div class="ctrl-skip">⏭</div>
            <div class="ctrl-spacer"></div>
            <div class="ctrl-vol">
              <div class="ctrl-icon">🔊</div>
              <div class="vol-bar">
                <div class="vol-bar-fill"></div>
                <div class="vol-bar-thumb"></div>
              </div>
            </div>
            <div class="ctrl-icon">CC</div>
            <div class="ctrl-icon">⚙</div>
            <div class="ctrl-icon">⛶</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
