<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>方案 5 · 分路由(主页+play页) — nyy</title>
<style>
  :root {
    --orange: #FF8A3D;
    --orange-dark: #E8762E;
    --orange-soft: #FFF4EB;
    --bg: #fafafa;
    --card: #ffffff;
    --border: #e5e7eb;
    --border-soft: #f3f4f6;
    --text: #111827;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { background: #1a1a1a; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .browser { width: 1880px; height: 1080px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08); display: flex; flex-direction: column; }
  .chrome { height: 44px; background: linear-gradient(to bottom, #ebebeb, #d6d6d6); display: flex; align-items: center; padding: 0 16px; gap: 14px; border-bottom: 1px solid #b8b8b8; flex-shrink: 0; }
  .lights { display: flex; gap: 8px; }
  .lights span { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .lights .r { background: #ff5f57; box-shadow: inset 0 0 0 0.5px #e0443e; }
  .lights .y { background: #febc2e; box-shadow: inset 0 0 0 0.5px #dea123; }
  .lights .g { background: #28c840; box-shadow: inset 0 0 0 0.5px #1aab29; }
  .toolbar { display: flex; gap: 4px; }
  .toolbar .btn { width: 28px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: #5a5a5a; font-size: 14px; }
  .toolbar .btn.disabled { color: #b8b8b8; }
  .addr { flex: 1; max-width: 720px; height: 28px; background: white; border-radius: 6px; display: flex; align-items: center; padding: 0 12px; gap: 8px; font-size: 12px; color: #2a2a2a; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.15); }
  .viewport { flex: 1; overflow: hidden; position: relative; background: var(--bg); }

  /* === 方案 5:左侧主页 + 右侧 play 页预览 === */
  .layout-5 {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 0;
    height: 100%;
  }

  /* 左:主页 */
  .page-landing {
    display: flex;
    flex-direction: column;
    background: white;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .landing-topbar {
    height: 56px;
    display: flex; align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 7px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 14px;
    box-shadow: 0 2px 6px rgba(255,138,61,0.35);
  }
  .brand-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .landing-body {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px 48px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .landing-hint {
    display: inline-flex; align-items: center; gap: 6px;
    background: #dbeafe; color: #1e40af;
    font-size: 11px; padding: 4px 10px; border-radius: 6px;
    font-weight: 500;
    width: fit-content;
  }
  .landing-title {
    font-size: 22px; font-weight: 700; color: var(--text);
    line-height: 1.3;
  }
  .landing-title b { color: var(--orange); }
  .landing-sub {
    font-size: 13px; color: var(--text-muted);
  }
  .landing-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .file-summary {
    display: flex; align-items: center; gap: 14px;
    padding: 16px;
    background: var(--orange-soft);
    border-radius: 10px;
  }
  .file-icon {
    width: 52px; height: 52px; border-radius: 10px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    color: white; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    box-shadow: 0 4px 12px rgba(255,138,61,0.3);
  }
  .file-info { flex: 1; min-width: 0; }
  .file-info .name { font-size: 16px; font-weight: 600; color: var(--text); }
  .file-info .meta { font-size: 12px; color: var(--orange-dark); margin-top: 4px; font-weight: 500; }

  /* 提取码大展示 */
  .code-display {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, var(--orange-soft), #ffe5cc);
    border: 1px dashed var(--orange);
    border-radius: 12px;
  }
  .code-display .label { font-size: 12px; color: var(--orange-dark); font-weight: 500; letter-spacing: 0.1em; }
  .code-display .code {
    font-size: 36px; font-weight: 800; color: var(--orange-dark);
    margin: 8px 0;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.15em;
  }
  .code-display .hint { font-size: 11px; color: #b86a2e; }

  .meta-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .meta-cell {
    padding: 12px;
    background: var(--border-soft);
    border-radius: 8px;
  }
  .meta-cell .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .meta-cell .value { font-size: 14px; color: var(--text); font-weight: 500; margin-top: 4px; }

  .qr-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .qr-box {
    width: 80px; height: 80px;
    background: white;
    border-radius: 6px;
    padding: 4px;
    display: grid;
    grid-template-columns: repeat(21, 1fr);
    grid-template-rows: repeat(21, 1fr);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    flex-shrink: 0;
  }
  .qr-box i { background: #111; border-radius: 1px; opacity: 0; }
  .qr-row .text { flex: 1; }
  .qr-row .text .t1 { font-size: 13px; font-weight: 600; color: var(--text); }
  .qr-row .text .t2 { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* 视频预览入口(只有视频文件才显示) */
  .preview-cta {
    display: flex; align-items: center; gap: 16px;
    padding: 16px;
    background: linear-gradient(135deg, #1a1a1d, #0a0a0c);
    border-radius: 12px;
    color: white;
    cursor: pointer;
  }
  .preview-thumb {
    width: 88px; height: 56px;
    background: linear-gradient(135deg, #ff6b35 0%, #c1351f 100%);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .preview-thumb::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(255,200,100,0.5), transparent 60%);
  }
  .preview-thumb::before {
    content: '';
    width: 0; height: 0;
    border-left: 14px solid white;
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    margin-left: 4px;
    z-index: 1;
  }
  .preview-info { flex: 1; }
  .preview-info .t1 { font-size: 14px; font-weight: 600; }
  .preview-info .t2 { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 3px; }
  .preview-arrow { color: var(--orange); font-size: 18px; }

  .actions {
    display: flex; gap: 10px; margin-top: 4px;
  }
  .btn-orange {
    flex: 1;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    color: white; border: none; cursor: pointer;
    font-weight: 600; font-size: 14px;
    padding: 12px; border-radius: 8px;
    box-shadow: 0 2px 6px rgba(255,138,61,0.35);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-ghost {
    background: white; color: var(--text); border: 1px solid var(--border);
    font-weight: 500; font-size: 13px;
    padding: 12px 16px; border-radius: 8px;
    display: flex; align-items: center; gap: 6px;
  }

  /* 多文件缩略图墙(单文件场景不显示) */
  .file-wall-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-dim); font-weight: 600; margin-top: 4px;
  }

  /* 右:play 页预览 */
  .page-play {
    background: #000;
    display: flex; flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .play-label {
    position: absolute; top: 16px; left: 16px;
    z-index: 20;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 11px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .play-label::before {
    content: '▶'; color: var(--orange); font-size: 10px;
  }
  .play-iframe {
    flex: 1; border: 0; width: 100%;
    transform-origin: 0 0;
  }
</style>
</head>
<body>
  <div class="browser">
    <div class="chrome">
      <div class="lights"><span class="r"></span><span class="y"></span><span class="g"></span></div>
      <div class="toolbar"><span class="btn">‹</span><span class="btn disabled">›</span></div>
      <div class="addr"><span class="lock">🔒</span>dev.nyy.app/s/Ab3F7K</div>
    </div>
    <div class="viewport">
      <div class="layout-5">
        <!-- 左:主页(落地页) -->
        <div class="page-landing">
          <div class="landing-topbar">
            <div class="brand">
              <div class="brand-mark">拿</div>
              <div class="brand-name">拿呀呀</div>
            </div>
          </div>
          <div class="landing-body">
            <div class="landing-hint">🔗 这是分享落地页 — 轻量,信息一目了然</div>
            <div>
              <div class="landing-title">有人给你分享了 <b>1 个文件</b></div>
              <div class="landing-sub">2 天前 · 已被下载 7 次</div>
            </div>

            <div class="landing-card">
              <div class="file-summary">
                <div class="file-icon">MKV</div>
                <div class="file-info">
                  <div class="name">碟中谍8-最后的清算.mkv</div>
                  <div class="meta">5.28 GB · H.265 · AC-3 · 1920 × 1080 · 2h 49m</div>
                </div>
              </div>

              <div class="code-display">
                <div class="label">提 取 码</div>
                <div class="code">Ab3F7K</div>
                <div class="hint">支持直接分享链接或扫码打开</div>
              </div>

              <div class="meta-grid">
                <div class="meta-cell">
                  <div class="label">分享者</div>
                  <div class="value">小爱同学</div>
                </div>
                <div class="meta-cell">
                  <div class="label">过期时间</div>
                  <div class="value">7 天后</div>
                </div>
                <div class="meta-cell">
                  <div class="label">下载次数</div>
                  <div class="value">7 次</div>
                </div>
                <div class="meta-cell">
                  <div class="label">SHA-256</div>
                  <div class="value" style="font-family: ui-monospace, monospace; font-size: 12px;">a3f8c2…9b1d</div>
                </div>
              </div>

              <div class="qr-row">
                <div class="qr-box" id="qr"></div>
                <div class="text">
                  <div class="t1">扫码在手机上打开</div>
                  <div class="t2">提取码 Ab3F7K 已自动带入</div>
                </div>
              </div>

              <!-- 视频文件特有的"在线预览"入口 -->
              <div class="preview-cta">
                <div class="preview-thumb"></div>
                <div class="preview-info">
                  <div class="t1">▶ 在线预览视频</div>
                  <div class="t2">进入沉浸式播放器 · 由 SDP 自研引擎驱动</div>
                </div>
                <div class="preview-arrow">→</div>
              </div>

              <div class="actions">
                <button class="btn-orange">⬇  下载文件 · 5.28 GB</button>
                <button class="btn-ghost">⤴  转存</button>
                <button class="btn-ghost">🔗</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 右:play 页预览(用 iframe 嵌入方案 4) -->
        <div class="page-play">
          <div class="play-label">点击 ▶ 后跳转到这里</div>
          <iframe class="play-iframe" src="plan-4-immersive.html" scrolling="no"></iframe>
        </div>
      </div>
    </div>
  </div>
  <script>
    const qr = document.getElementById('qr');
    const W = 21, H = 21;
    let seed = 0x9A2C;
    const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    const finderPattern = (cx, cy) => (xx, yy) => {
      const xd = Math.abs(xx - cx), yd = Math.abs(yy - cy);
      if (xd === 3 || yd === 3) return true;
      if (xd <= 1 && yd <= 1) return true;
      return false;
    };
    const fp1 = finderPattern(3, 3), fp2 = finderPattern(17, 3), fp3 = finderPattern(3, 17);
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const el = document.createElement('i');
        let black = false;
        if (x < 7 && y < 7) black = fp1(x, y);
        else if (x > 13 && y < 7) black = fp2(x, y);
        else if (x < 7 && y > 13) black = fp3(x, y);
        else black = rnd() > 0.52;
        if (black) el.style.opacity = '1';
        qr.appendChild(el);
      }
    }

    // iframe 缩放:1080 设计宽 → 实际容器宽,等比缩放
    function resizeIframe() {
      const iframe = document.querySelector('.play-iframe');
      const designW = 1880, designH = 1080;
      const container = iframe.parentElement;
      const cw = container.clientWidth, ch = container.clientHeight;
      const scale = Math.min(cw / designW, ch / designH);
      iframe.style.transform = `scale(${scale})`;
      iframe.style.width = designW + 'px';
      iframe.style.height = designH + 'px';
    }
    window.addEventListener('load', resizeIframe);
    window.addEventListener('resize', resizeIframe);
    resizeIframe();
  </script>
</body>
</html>
