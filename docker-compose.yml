services:
  postgres:
    image: postgres:16-alpine
    container_name: nyy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nyy
      POSTGRES_PASSWORD: nyy
      POSTGRES_DB: nyy
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nyy-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./redisdata:/data
